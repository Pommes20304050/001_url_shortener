<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="3;url={{ long_url }}">
  <title>Weiterleitung…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #09090f; color: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .box {
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px; padding: 40px 36px;
      max-width: 520px; width: 100%; text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,.5);
      animation: pop .3s ease;
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .icon { font-size: 2.8rem; display: block; margin-bottom: 16px; }
    h2 { font-size: 1.4rem; font-weight: 700; color: #a78bfa; margin-bottom: 6px; }
    .note { color: #475569; font-size: .8rem; margin-bottom: 20px; }
    .dest-url {
      color: #10b981; word-break: break-all; font-size: .88rem;
      background: rgba(16,185,129,.07); border: 1px solid rgba(16,185,129,.18);
      border-radius: 9px; padding: 12px 16px; margin-bottom: 24px;
      display: block; text-align: left; line-height: 1.5;
    }
    a.go-btn {
      display: inline-block; padding: 13px 32px;
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: #fff; border-radius: 10px; text-decoration: none;
      font-weight: 700; font-size: .95rem;
      transition: opacity .15s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(124,58,237,.3);
    }
    a.go-btn:hover { opacity: .88; box-shadow: 0 6px 28px rgba(124,58,237,.45); }
    .progress-bar {
      width: 100%; height: 3px; background: rgba(255,255,255,.07);
      border-radius: 2px; margin-top: 28px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #6366f1);
      border-radius: 2px;
      animation: fill 3s linear forwards;
    }
    @keyframes fill { from { width: 0%; } to { width: 100%; } }
    .short-code { color: #475569; font-size: .72rem; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="box">
    <span class="icon">🔗</span>
    <h2>Weiterleitung…</h2>
    <p class="note">Du wirst weitergeleitet zu:</p>
    <span class="dest-url">{{ long_url }}</span>
    <a class="go-btn" href="{{ long_url }}">Jetzt weiterleiten →</a>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <p class="short-code">Automatisch in 3 Sekunden &middot; Code: {{ code }}</p>
  </div>
</body>
</html>
